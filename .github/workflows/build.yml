name: Build LiveGo APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bypass Project Initialization
        run: |
          rm -rf android
          flutter create --platforms android --org com.celosz.livego_streaming --project-name livego_streaming .
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/ <application android:usesCleartextTraffic="true" /' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Save Result
        uses: actions/upload-artifact@v4
        with:
          name: livego_apk
          path: build/app/outputs/flutter-apk/app-release.apk
